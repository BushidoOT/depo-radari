name: Depo Radari Gunluk Veri Guncelle

on:
  workflow_dispatch:
  schedule:
    # Turkiye saati ile yaklasik 07:00
    - cron: "0 4 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Repo indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri kur
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas

      - name: Veri guncelle
        run: |
          python depo_radari_veri_guncelle_v4.py

      - name: Degisiklikleri kontrol et
        id: changes
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Degisiklikleri kaydet
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "depo-radari-bot"
          git config user.email "depo-radari-bot@users.noreply.github.com"
          git add depo_radari_tum_ihaleler_guvenli_v3.csv depo_radari_ozet.json depo_radari_log.txt || true
          git commit -m "Gunluk veri guncelleme"
          git push
